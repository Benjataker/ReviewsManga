<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Archive - Edición Admin & Sugerencias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --manga-black: #1a1a1a;
            --manga-red: #e63946;
            --manga-paper: #fcfaf7;
            --manga-border: 3px solid #1a1a1a;
            --manga-yellow: #fef08a;
        }

        body {
            background-color: #f0f0f0;
            background-image: radial-gradient(var(--manga-black) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            background-attachment: fixed;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--manga-black);
        }

        .manga-panel {
            background: var(--manga-paper);
            border: var(--manga-border);
            box-shadow: 8px 8px 0px 0px var(--manga-black);
            transition: all 0.2s ease;
        }

        .manga-header {
            background: var(--manga-black);
            color: white;
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
        }

        .manga-title {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .rating-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: #ddd;
            border: 2px solid var(--manga-black);
            outline: none;
        }

        .rating-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e63946;
            border: 2px solid black;
            cursor: pointer;
        }

        .rating-slider:hover {
            background:#fca5a5;
        }

        .genre-tag {
            cursor: pointer;
            border: 2px solid var(--manga-black);
            font-weight: 700;
            font-size: 10px;
            background: white;
            padding: 2px 8px;
        }

        .genre-tag.active {
            background: var(--manga-black);
            color: white;
            transform: translate(-2px, -2px);
            box-shadow: 2px 2px 0px var(--manga-red);
        }

        .btn-manga {
            border: var(--manga-border);
            background: white;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--manga-black);
            transition: 0.1s;
        }

        .btn-manga:active {
            box-shadow: 0px 0px 0px var(--manga-black);
            transform: translate(4px, 4px);
        }

        .btn-manga-red {
            background: var(--manga-red);
            color: white;
        }

        .editing-mode {
            background-color: #fff5f5 !important;
            border-color: var(--manga-red) !important;
            box-shadow: 8px 8px 0px 0px var(--manga-red) !important;
        }

        .tab-btn {
            font-weight: 900;
            border: var(--manga-border);
            background: white;
            margin: 0 4px;
            transition: 0.2s;
        }

        .tab-active { background: var(--manga-black); color: white; }
        .tab-club-active { background: var(--manga-red); color: white; }
        .tab-suggest-active { background: #ca8a04; color: white; }

        .data-action-icon {
            opacity: 0.5;
            color: white;
            transition: 0.3s;
        }
        .data-action-icon:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        #detail-modal.active {
            display: flex;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border: 2px solid #000;
        }
        input:checked + .slider { background-color: var(--manga-red); }

        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        body.is-admin .admin-only-flex { display: flex !important; }

        #reviewsList.admin-grid {
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
        }

        .suggest-card {
            background: var(--manga-yellow);
            border: 3px solid #000;
            box-shadow: 5px 5px 0px #000;
            transform: rotate(-1deg);
        }
        .suggest-card:nth-child(even) { transform: rotate(1.5deg); }
    </style>
</head>
<body class="pb-20">

    <header class="manga-header py-8 px-4 mb-10 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-5xl manga-title italic">
                    <span class="text-red-500">OTAKU</span> SIN PRESUPUESTO <small class="text-sm font-sans not-italic block md:inline text-gray-400">記録</small>
                </h1>
                <p class="text-gray-400 text-xs mt-2 font-bold tracking-widest uppercase">Reseñas de Benjataker con pequeña ayuda de la IA</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex gap-3 pr-4 border-r border-gray-700 admin-only-flex">
                    <!-- Botón Sincronizar (nuevo) -->
                    <button onclick="syncFromRemote()" class="data-action-icon" title="Sincronizar con repositorio">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                    <button onclick="document.getElementById('importFile').click()" class="data-action-icon" title="Importar">
                        <i class="fas fa-file-import"></i>
                    </button>
                    <button onclick="exportData()" class="data-action-icon" title="Exportar">
                        <i class="fas fa-file-export"></i>
                    </button>
                </div>

                <button id="admin-lock-btn" onclick="toggleAdminMode()" class="data-action-icon mr-2 text-xl" title="Modo Administrador">
                    <i class="fas fa-lock"></i>
                </button>

                <button onclick="cancelEdit(); scrollToForm()" class="btn-manga px-6 py-2 text-sm admin-only">
                    <i class="fas fa-plus-circle mr-2"></i>NUEVA RESEÑA
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-10">
        
        <!-- Formulario de Admin -->
        <section id="admin-sidebar" class="lg:col-span-4 admin-only">
            <div id="form-container" class="manga-panel p-6 sticky top-4 max-h-[95vh] overflow-y-auto">
                <h2 id="form-title" class="text-xl font-black mb-6 flex items-center gap-2 border-b-4 border-black pb-2 italic text-red-600">
                    <i class="fas fa-edit"></i> REGISTRO DE PODER
                </h2>
                
                <form id="reviewForm" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    
                    <div class="flex gap-2 mb-4">
                        <button type="button" onclick="setFormCategory('personal')" id="btn-cat-personal" class="flex-1 py-2 text-[10px] font-black border-2 border-black bg-black text-white uppercase">Personal</button>
                        <button type="button" onclick="setFormCategory('club')" id="btn-cat-club" class="flex-1 py-2 text-[10px] font-black border-2 border-black text-gray-400 uppercase bg-white">Club</button>
                        <input type="hidden" id="category" value="personal">
                    </div>

                    <div id="club-version-container" class="hidden bg-red-50 p-3 border-2 border-black mb-3">
                        <label class="block text-[10px] font-black uppercase mb-1">Edición del Club</label>
                        <input type="text" id="club-version" placeholder="Ej: 03-2024" class="w-full px-3 py-1.5 text-sm border-2 border-black outline-none">
                    </div>

                    <div class="space-y-3">
                        <input type="text" id="title" required placeholder="TÍTULO DEL MANGA" class="w-full px-3 py-2 text-sm border-2 border-black font-bold outline-none focus:bg-yellow-50">
                        <input type="text" id="author" required placeholder="AUTOR / ARTISTA" class="w-full px-3 py-2 text-sm border-2 border-black font-bold outline-none focus:bg-yellow-50">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <select id="demography" class="w-full px-2 py-2 text-sm border-2 border-black font-bold outline-none">
                            <option>SHONEN</option><option>SEINEN</option><option>SHOJO</option><option>JOSEI</option><option>KODOMO</option>
                        </select>
                        <input type="number" id="year" placeholder="AÑO" class="w-full px-2 py-2 text-sm border-2 border-black outline-none">
                    </div>

                    <div>
                        <div id="genre-container" class="flex flex-wrap gap-2 mb-3 max-h-32 overflow-y-auto p-2 border-2 border-black bg-white"></div>
                        <div class="flex gap-2">
                            <input type="text" id="custom-genre" placeholder="Otro género..." class="flex-1 px-2 py-1 text-xs border-2 border-black outline-none">
                            <button type="button" onclick="addCustomGenre()" class="btn-manga px-3 py-1 text-[10px]">+ ADD</button>
                        </div>
                    </div>

                   <div class="space-y-3 border-t-2 border-black pt-4">
                        <h3 class="font-black text-xs uppercase tracking-tighter">Métricas de Poder (1-10)</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="rating-item">
                                <div class="flex justify-between text-[9px] font-black uppercase"><span>Expectativas</span><span class="val-display">5</span></div>
                                <input type="range" id="val_initial" min="1" max="10" step="0.5" value="5" class="rating-slider">
                            </div>
                            <div class="rating-item">
                                <div class="flex justify-between text-[9px] font-black uppercase"><span>Historia</span><span class="val-display">5</span></div>
                                <input type="range" id="val_story" min="1" max="10" step="0.5" value="5" class="rating-slider">
                            </div>
                            <div class="rating-item">
                                <div class="flex justify-between text-[9px] font-black uppercase"><span>Mundo</span><span class="val-display">5</span></div>
                                <input type="range" id="val_world" min="1" max="10" step="0.5" value="5" class="rating-slider">
                            </div>
                            <div class="rating-item">
                                <div class="flex justify-between text-[9px] font-black uppercase"><span>Ritmo</span><span class="val-display">5</span></div>
                                <input type="range" id="val_pacing" min="1" max="10" step="0.5" value="5" class="rating-slider">
                            </div>
                            <div class="rating-item">
                                <div class="flex justify-between text-[9px] font-black uppercase"><span>Personajes</span><span class="val-display">5</span></div>
                                <input type="range" id="val_chars" min="1" max="10" step="0.5" value="5" class="rating-slider">
                            </div>
                            <div class="rating-item">
                                <div class="flex justify-between text-[9px] font-black uppercase"><span>Protagonista</span><span class="val-display">5</span></div>
                                <input type="range" id="val_protagonist" min="1" max="10" step="0.5" value="5" class="rating-slider">
                            </div>
                            <div class="rating-item col-span-2">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-[9px] font-black uppercase">Antagonista</span>
                                    <label class="switch">
                                        <input type="checkbox" id="has_villain" checked onchange="toggleVillainRating(document.getElementById('has_villain').checked)">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                                <div id="villain_slider_container">
                                    <div class="flex justify-between text-[9px] font-black uppercase mb-1"><span>Poder Antagónico</span><span class="val-display" id="val-display-villain">5</span></div>
                                    <input type="range" id="val_villain" min="1" max="10" step="0.5" value="5" class="rating-slider">
                                </div>
                            </div>
                            <div class="rating-item col-span-2 border-t border-black pt-2">
                                <div class="flex justify-between text-xs font-black uppercase text-red-600"><span>Nota Final</span><span class="val-display">5</span></div>
                                <input type="range" id="val_final" min="1" max="10" step="0.5" value="5" class="rating-slider" style="background: #fee2e2;">
                            </div>
                        </div>
                    </div>
        
                        <textarea id="comment" rows="3" class="w-full mt-1 px-3 py-2 text-sm border-2 border-black outline-none focus:bg-yellow-50" placeholder="Escribe tu veredicto..."></textarea>              
                    <input type="text" id="imageUrl" class="w-full px-3 py-1.5 text-xs border-2 border-black outline-none" placeholder="Link Portada">

                    <div class="flex gap-2 pt-4">
                        <button type="submit" id="submit-btn" class="flex-1 btn-manga btn-manga-red py-3">SUBIR CAPÍTULO</button>
                        <button type="button" id="cancel-edit-btn" onclick="cancelEdit()" class="hidden btn-manga px-4 py-3"><i class="fas fa-times"></i></button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Listado Principal -->
        <section id="list-section" class="lg:col-span-8">
            <div class="flex flex-col gap-8">
                <!-- Navegación de Pestañas -->
                <div class="flex gap-2 overflow-x-auto pb-2">
                    <button onclick="setActiveTab('personal')" id="tab-personal" class="flex-1 min-w-[140px] py-3 tab-btn tab-active uppercase text-xs">Biblioteca Personal</button>
                    <button onclick="setActiveTab('club')" id="tab-club" class="flex-1 min-w-[140px] py-3 tab-btn uppercase text-xs text-gray-400">Club de Lectura</button>
                    <button onclick="setActiveTab('suggestions')" id="tab-suggestions" class="flex-1 min-w-[140px] py-3 tab-btn uppercase text-xs text-gray-400">Muro de Sugerencias</button>
                </div>

                <!-- Filtros y Buscador (Ocultos en sugerencias) -->
                <div id="filter-bar" class="manga-panel p-4 flex flex-wrap gap-4 items-center">
                    <div class="flex-1 min-w-[200px] relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2"></i>
                        <input type="text" id="search-input" oninput="renderReviews()" placeholder="BUSCAR TÍTULO O AUTOR..." class="w-full pl-10 pr-4 py-2 border-2 border-black font-bold text-sm outline-none">
                    </div>
                    <select id="filter-genre" onchange="renderReviews()" class="border-2 border-black px-4 py-2 text-sm font-black bg-white outline-none">
                        <option value="all">GÉNEROS</option>
                    </select>
                </div>

                <!-- Contenido de Sugerencias (Formulario de envío) -->
                <div id="suggestion-form-container" class="hidden mb-4">
                    <div class="manga-panel p-4 bg-yellow-50 border-dashed max-w-3xl mx-auto">
                        <h3 class="text-xl font-black mb-4 uppercase italic"><i class="fas fa-paper-plane mr-2"></i>¿Qué debería leer después?</h3>
                        <div class="flex flex-col md:flex-row gap-3">
                            <input type="text" id="suggest-title" placeholder="Título del Manga" class="px-4 py-2 border-2 border-black font-bold outline-none">
                            <input type="text" id="suggest-author" placeholder="Autor" class="px-4 py-2 border-2 border-black font-bold outline-none">
                            <button onclick="submitSuggestion()" class="btn-manga bg-yellow-400 px-6 py-1.5">ENVIAR SUGERENCIA</button>
                        </div>
                    </div>
                </div>

                <div id="reviewsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>
        </section>
    </main>

    <!-- Modal Detalle -->
	<div id="detail-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm items-center justify-center p-4 z-[200] hidden">
        <div class="manga-panel bg-white w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col md:flex-row relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 z-10 btn-manga w-10 h-10 flex items-center justify-center"><i class="fas fa-times"></i></button>
            
            <div class="md:w-2/5 h-64 md:h-auto border-b-4 md:border-b-0 md:border-r-4 border-black">
                <img id="modal-img" class="w-full h-full object-cover">
            </div>

            <div class="md:w-3/5 p-8 overflow-y-auto">
                <div class="flex gap-2 items-center mb-4">
                    <span id="modal-cat" class="text-[10px] font-black border-2 border-black px-3 py-1 uppercase"></span>
                    <span id="modal-version-badge" class="text-[10px] font-black bg-gradient-to-r from-red-600 to-red-800 text-white border-2 border-black px-3 py-1 uppercase hidden shadow-md"></span>
                </div>
                
                <h2 id="modal-title" class="text-4xl font-black uppercase italic mb-1 tracking-tighter leading-none"></h2>
                <p id="modal-author" class="text-xl font-bold text-red-600 mb-6"></p>
                <div id="modal-genres" class="flex flex-wrap gap-2 mb-6"></div>
                
                <div id="modal-metrics"class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8 bg-gray-100 p-4 border-2 border-black"></div>
                
                <div class="relative bg-white p-6 border-2 border-black mb-6">
                    <div class="absolute -top-3 left-4 bg-black text-white text-[10px] px-2 font-black">COMENTARIOS</div>
                    <p id="modal-comment" class="text-sm font-medium leading-relaxed italic"></p>
                </div>

                <button onclick="closeModal()" class="w-full btn-manga py-3 text-sm">VOLVER AL ARCHIVO</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-black text-white border-2 border-white px-8 py-4 font-black uppercase text-xs z-[1000] opacity-0 transition-all pointer-events-none"></div>

    <script>
        const ADMIN_PASSWORD = "otaku123"; 
        
        let reviews = JSON.parse(localStorage.getItem('myReviews_manga')) || [];
        let suggestions = JSON.parse(localStorage.getItem('manga_suggestions')) || [];
        let customGenres = JSON.parse(localStorage.getItem('customGenres_manga')) || [];
        let selectedGenres = [];
        let activeTab = 'personal';

        const baseGenres = ["Nekketsu", "Mecha", "Isekai", "Spokon", "Cyberpunk", "Horror", "Fantasía", "Romance", "Acción", "Drama", "Manga", "Manwha", "Donhua"];

        // ---------- FUNCIÓN PARA CARGAR DATOS DESDE EL REPOSITORIO ----------
        async function loadRemoteData() {
            try {
                const response = await fetch('./archivos json/datos.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                // Validar estructura básica
                if (data.reviews && Array.isArray(data.reviews)) {
                    reviews = data.reviews;
                }
                if (data.suggestions && Array.isArray(data.suggestions)) {
                    suggestions = data.suggestions;
                }
                if (data.customGenres && Array.isArray(data.customGenres)) {
                    customGenres = data.customGenres;
                }
                // Guardar en localStorage para uso offline
                localStorage.setItem('myReviews_manga', JSON.stringify(reviews));
                localStorage.setItem('manga_suggestions', JSON.stringify(suggestions));
                localStorage.setItem('customGenres_manga', JSON.stringify(customGenres));
                showToast('DATOS CARGADOS DESDE EL REPOSITORIO');
                // Refrescar toda la UI
                renderGenreCloud();
                renderReviews();
                populateGenreFilter();
            } catch (error) {
                console.warn('No se pudo cargar el archivo remoto. Usando datos locales (si existen).', error);
                // No mostramos toast para no molestar, pero sí en consola
            }
        }

        // Función para sincronizar manualmente (botón)
        async function syncFromRemote() {
            await loadRemoteData();
        }

        // ---------- RESTO DE FUNCIONES (sin cambios relevantes) ----------
        function initializeSliders() {
            document.querySelectorAll('.rating-item')
                .forEach(item => {
                const slider = item.querySelector('input[type="range"]');
                const display = item.querySelector('.val-display');
                if(!slider || !display) return;
                display.textContent = slider.value;
                slider.oninput = function(){
                    display.textContent = this.value;
                };
            });
        }

        function toggleVillainRating(enabled) {
            const container = document.getElementById('villain_slider_container');
            container.style.display = enabled ? 'block' : 'none';
        }

        function toggleAdminMode() {
            if (document.body.classList.contains('is-admin')) {
                if (confirm("¿Cerrar sesión de administrador?")) {
                    document.body.classList.remove('is-admin');
                    localStorage.setItem('myReviews_manga_backup',localStorage.getItem('myReviews_manga') || '[]');
                    localStorage.setItem('manga_admin', 'false');
                    document.getElementById('admin-lock-btn').innerHTML = '<i class="fas fa-lock"></i>';
                    updateLayout();
                    renderReviews();
                }
            } else {
                const pass = prompt("Contraseña de Admin:");
                if (pass === ADMIN_PASSWORD) {
                    document.body.classList.add('is-admin');
                    localStorage.setItem('manga_admin', 'true');
                    document.getElementById('admin-lock-btn').innerHTML = '<i class="fas fa-lock-open text-red-500"></i>';
                    showToast("MODO ADMIN ACTIVADO");
                    updateLayout();
                    renderReviews();
                }
            }
        }

        function checkAdminSession() {
            if (localStorage.getItem('manga_admin') === 'true') {
                document.body.classList.add('is-admin');
                document.getElementById('admin-lock-btn').innerHTML = '<i class="fas fa-lock-open text-red-500"></i>';
            }
            updateLayout();
        }

        function updateLayout() {
            const sidebar = document.getElementById('admin-sidebar');
            const listSection = document.getElementById('list-section');
            const adminMode = document.body.classList.contains('is-admin');

            if(activeTab === 'suggestions') {
                sidebar.style.display = 'none';
                listSection.classList.remove('lg:col-span-8');
                listSection.classList.add('lg:col-span-12');
                return;
            }
            if(adminMode){
                sidebar.style.display = '';
                listSection.classList.remove('lg:col-span-12');
                listSection.classList.add('lg:col-span-8');
            } else {
                sidebar.style.display = 'none';
                listSection.classList.remove('lg:col-span-8');
                listSection.classList.add('lg:col-span-12');
            }
        }

        function setActiveTab(tab) {
            activeTab = tab;
            document.getElementById('tab-personal').className = `flex-1 py-3 tab-btn uppercase text-xs ${tab === 'personal' ? 'tab-active' : 'text-gray-400'}`;
            document.getElementById('tab-club').className = `flex-1 py-3 tab-btn uppercase text-xs ${tab === 'club' ? 'tab-club-active' : 'text-gray-400'}`;
            document.getElementById('tab-suggestions').className = `flex-1 py-3 tab-btn uppercase text-xs ${tab === 'suggestions' ? 'tab-suggest-active' : 'text-gray-400'}`;
            
            const filterBar = document.getElementById('filter-bar');
            const suggestForm = document.getElementById('suggestion-form-container');
            
            if (tab === 'suggestions') {
                filterBar.classList.add('hidden');
                suggestForm.classList.remove('hidden');
                suggestForm.style.display = 'block';
            } else {
                filterBar.classList.remove('hidden');
                suggestForm.classList.add('hidden');
                suggestForm.style.display = 'none';
            }
            
            updateLayout();
            renderReviews();
        }

        function renderReviews() {
            const container = document.getElementById('reviewsList');
            const adminMode = document.body.classList.contains('is-admin');
            container.innerHTML = "";
            if(activeTab === 'suggestions'){
                container.className = "grid gap-6 grid-cols-1 md:grid-cols-2 lg:grid-cols-2 max-w-5xl mx-auto";
            } else {
                container.className = "grid gap-8 " + (adminMode && activeTab !== 'suggestions' ? "grid-cols-1 md:grid-cols-2" : "grid-cols-1 md:grid-cols-2 lg:grid-cols-3");
            }

            if (activeTab === 'suggestions') {
                if (suggestions.length === 0) {
                    container.innerHTML = `<div class="col-span-full py-20 text-center font-black text-gray-400 italic">AÚN NO HAY SUGERENCIAS. ¡SÉ EL PRIMERO!</div>`;
                    return;
                }
                suggestions.forEach((s, index) => {
                    container.innerHTML += `
                        <div class="suggest-card p-6 flex flex-col justify-between min-h-[160px] relative group">
                            <div>
                                <h3 class="text-2xl font-black uppercase leading-tight mb-2 tracking-tighter">${s.title}</h3>
                                <p class="text-sm font-bold text-gray-700 italic">Recomendado por alguien genial</p>
                            </div>
                            <div class="mt-4 border-t-2 border-black pt-2 flex justify-between items-center">
                                <span class="font-black text-xs uppercase">Autor: ${s.author}</span>
                                ${adminMode ? `<button onclick="deleteSuggestion(${index})" class="text-red-600 hover:scale-125 transition-transform"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                            <div class="absolute -top-3 -right-3 bg-black text-white w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold border-2 border-black">!</div>
                        </div>
                    `;
                });
                return;
            }

            const search = document.getElementById('search-input').value.toLowerCase();
            const genre = document.getElementById('filter-genre').value;
            const filtered = reviews.filter(r => {
                const catMatch = (r.category || 'personal') === activeTab;
                const searchMatch = (r.title || '').toLowerCase().includes(search) || (r.author || '').toLowerCase().includes(search);
                const genreMatch = genre === 'all' || (r.genres && r.genres.includes(genre));
                return catMatch && searchMatch && genreMatch;
            });

            filtered.forEach(r => {
                container.innerHTML += `
                    <div class="manga-panel flex bg-white group overflow-hidden h-48 relative">
                        <div onclick="openModal(${r.id})" class="flex flex-1 cursor-pointer">
                            <div class="w-32 flex-shrink-0 bg-gray-200 border-r-4 border-black relative overflow-hidden">
                                <img src="${r.imageUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://via.placeholder.com/150x200?text=NO+IMAGE'">
                            </div>
                            <div class="p-4 flex-1 flex flex-col justify-between">
                                <div>
                                    <h3 class="text-lg font-black uppercase tracking-tighter leading-none line-clamp-2">${r.title}</h3>
                                    <p class="text-[10px] font-bold text-red-600 mt-1 italic">${r.author}</p>
                                </div>
                                <div class="flex justify-between items-end">
                                    <div class="flex flex-wrap gap-1">
                                        ${(r.genres || []).slice(0,2).map(g => `<span class="text-[7px] border border-black px-1 font-black uppercase">${g}</span>`).join('')}
                                    </div>
                                    <div class="text-right">
                                        <div class="text-3xl font-black italic leading-none text-red-600">${r.metrics?.total || '0'}</div>
                                        <div class="text-[8px] font-black uppercase">LVL</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        ${adminMode ? `
                        <div class="absolute top-2 right-2 flex flex-col gap-2 z-30 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="startEdit(event, ${r.id})" class="bg-black text-white w-8 h-8 flex items-center justify-center border-2 border-black"><i class="fas fa-pencil-alt text-xs"></i></button>
                            <button onclick="deleteReview(event, ${r.id})" class="bg-red-600 text-white w-8 h-8 flex items-center justify-center border-2 border-black"><i class="fas fa-trash text-xs"></i></button>
                        </div>` : ''}
                    </div>
                `;
            });
        }

        function submitSuggestion() {
            const title = document.getElementById('suggest-title').value.trim();
            const author = document.getElementById('suggest-author').value.trim();
            
            if (!title || !author) {
                showToast("COMPLETA TÍTULO Y AUTOR");
                return;
            }

            suggestions.unshift({ title, author, date: new Date().toISOString() });
            localStorage.setItem('manga_suggestions', JSON.stringify(suggestions));
            
            document.getElementById('suggest-title').value = '';
            document.getElementById('suggest-author').value = '';
            
            showToast("¡GRACIAS POR LA SUGERENCIA!");
            renderReviews();
        }

        function deleteSuggestion(index) {
            if(confirm("¿ELIMINAR SUGERENCIA?")) {
                suggestions.splice(index, 1);
                localStorage.setItem('manga_suggestions', JSON.stringify(suggestions));
                renderReviews();
            }
        }

        function setFormCategory(cat) {
            document.getElementById('category').value = cat;
            const clubContainer = document.getElementById('club-version-container');
            if(cat === 'club') {
                clubContainer.classList.remove('hidden');
                document.getElementById('btn-cat-club').className = "flex-1 py-2 text-[10px] font-black border-2 border-black bg-red-600 text-white uppercase";
                document.getElementById('btn-cat-personal').className = "flex-1 py-2 text-[10px] font-black border-2 border-black text-gray-400 uppercase bg-white";
            } else {
                clubContainer.classList.add('hidden');
                document.getElementById('btn-cat-personal').className = "flex-1 py-2 text-[10px] font-black border-2 border-black bg-black text-white uppercase";
                document.getElementById('btn-cat-club').className = "flex-1 py-2 text-[10px] font-black border-2 border-black text-gray-400 uppercase bg-white";
            }
        }

        document.getElementById('reviewForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const idInput = document.getElementById('edit-id').value;
            const category = document.getElementById('category').value;
            
            const data = {
                id: idInput ? parseInt(idInput) : Date.now(),
                category: category,
                clubVersion:document.getElementById('club-version').value,
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                demography: document.getElementById('demography').value,
                year: document.getElementById('year').value,
                genres: [...selectedGenres],
                comment: document.getElementById('comment').value,
                imageUrl: document.getElementById('imageUrl').value || 'https://via.placeholder.com/400x600?text=MANGA',
                favorite: false,
                metrics: {
                    initial: document.getElementById('val_initial').value,
                    story: document.getElementById('val_story').value,
                    world: document.getElementById('val_world').value,
                    pacing: document.getElementById('val_pacing').value,
                    chars: document.getElementById('val_chars').value,
                    protagonist: document.getElementById('val_protagonist').value,
                    villain:document.getElementById('has_villain').checked ? document.getElementById('val_villain').value: null,
                    total: document.getElementById('val_final').value
                }
            };

            if (idInput) reviews = reviews.map(r => r.id === data.id ? data : r);
            else reviews.unshift(data);
            
            cancelEdit();
            saveAndRender();
            showToast("DATOS GUARDADOS");
        });

        function saveAndRender() {
            localStorage.setItem('myReviews_manga', JSON.stringify(reviews));
            localStorage.setItem('manga_suggestions', JSON.stringify(suggestions));
            localStorage.setItem('customGenres_manga', JSON.stringify(customGenres));
            renderReviews();
            populateGenreFilter();
        }

        function cancelEdit() {
            document.getElementById('reviewForm').reset();
            document.getElementById('edit-id').value = '';
            selectedGenres = [];
            renderGenreCloud();
            document.getElementById('form-container').classList.remove('editing-mode');
            document.querySelectorAll('.rating-slider').forEach(slider => {slider.value = 5;});
            initializeSliders();
            setFormCategory('personal');
        }

        function startEdit(e, id) {
            e.stopPropagation();
            const r = reviews.find(x => x.id === id);
            if (!r) return;
            document.getElementById('club-version').value = r.clubVersion || '';
            document.getElementById('edit-id').value = r.id;
            document.getElementById('title').value = r.title;
            document.getElementById('author').value = r.author;
            document.getElementById('imageUrl').value = r.imageUrl;
            document.getElementById('comment').value = r.comment;
            document.getElementById('year').value = r.year || '';
            document.getElementById('demography').value = r.demography || '';
            document.getElementById('val_initial').value = r.metrics.initial || 5;
            document.getElementById('val_story').value = r.metrics.story || 5;
            document.getElementById('val_world').value = r.metrics.world || 5;
            document.getElementById('val_pacing').value = r.metrics.pacing || 5;
            document.getElementById('val_chars').value = r.metrics.chars || 5;
            document.getElementById('val_protagonist').value = r.metrics.protagonist || 5;
            document.getElementById('val_final').value = r.metrics.total || 5;
            document.getElementById('year').value = r.year || '';
            document.getElementById('demography').value = r.demography || '';
            document.getElementById('club-version').value = r.clubVersion || '';
            setFormCategory(r.category);
            selectedGenres = [...r.genres];
            renderGenreCloud();
            document.getElementById('form-container').classList.add('editing-mode');
            scrollToForm();
            initializeSliders();
        }

        function openModal(id) {
            const r = reviews.find(x => x.id === id);
            if (!r) return;
            document.getElementById('modal-img').src = r.imageUrl;
            document.getElementById('modal-title').textContent = r.title;
            document.getElementById('modal-author').innerHTML =`${r.author}<br><span class="text-sm text-gray-600">${r.demography} •${r.year}</span>`;
            document.getElementById('modal-genres').innerHTML =(r.genres || []).map(g => `<span class="text-[10px] font-black border-2 border-black px-3 py-1 uppercase bg-white"> ${g}</span>`).join('');
            document.getElementById('modal-comment').textContent = r.comment || "Sin comentarios.";
            document.getElementById('modal-cat').textContent = r.category === 'club' ? 'Club de Lectura' : 'Personal';
            const metrics = r.metrics || {};
            const versionBadge = document.getElementById('modal-version-badge');
            if (r.category === 'club' && r.clubVersion) {
                versionBadge.textContent = `Edición ${r.clubVersion}`;
                versionBadge.classList.remove('hidden');
            } else {
                versionBadge.classList.add('hidden');
            }
            document.getElementById('modal-metrics').innerHTML = `<div class="text-center"><div class="font-black text-xl">${metrics.initial ?? '-'}</div>
            <div class="text-[9px] uppercase">Expectativas</div></div>
            <div class="text-center"><div class="font-black text-xl">${metrics.story ?? '-'}</div><div class="text-[9px] uppercase">Historia</div></div>
            <div class="text-center"><div class="font-black text-xl">${metrics.world ?? '-'}</div><div class="text-[9px] uppercase">Mundo</div></div>
            <div class="text-center"><div class="font-black text-xl">${metrics.pacing ?? '-'}</div><div class="text-[9px] uppercase">Ritmo</div></div>
            <div class="text-center"><div class="font-black text-xl">${metrics.chars ?? '-'}</div><div class="text-[9px] uppercase">Personajes</div></div>
            <div class="text-center"><div class="font-black text-xl">${metrics.protagonist ?? '-'}</div><div class="text-[9px] uppercase">Protagonista</div></div>
            <div class="text-center"><div class="font-black text-xl">${metrics.villain ?? '-'}</div><div class="text-[9px] uppercase">Antagonista</div></div>
            <div class="text-center"><div class="font-black text-2xl text-red-600">${metrics.total ?? '-'}</div><div class="text-[9px] uppercase">Final</div></div>`;
            document.getElementById('detail-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('detail-modal').classList.remove('active'); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity='0', 2000); }
        function scrollToForm() { document.getElementById('form-container').scrollIntoView({ behavior: 'smooth' }); }
        function renderGenreCloud() {
            const cloud = document.getElementById('genre-container');
            cloud.innerHTML = [...new Set([...baseGenres, ...customGenres])].map(g => `
                <span onclick="toggleGenre('${g}')" class="genre-tag ${selectedGenres.includes(g) ? 'active' : ''}">${g.toUpperCase()}</span>
            `).join('');
        }

        function toggleGenre(g) {
            selectedGenres = selectedGenres.includes(g) ? selectedGenres.filter(x => x !== g) : [...selectedGenres, g];
            renderGenreCloud();
        }

        function addCustomGenre() {
            const input = document.getElementById('custom-genre');
            const val = input.value.trim();
            if (!val) return;
            if (!customGenres.includes(val)) {
                customGenres.push(val);
            }
            if (!selectedGenres.includes(val)) {
                selectedGenres.push(val);
            }
            input.value = '';
            renderGenreCloud();
        }

        function deleteReview(e, id) {
            e.stopPropagation();
            if(confirm("¿ELIMINAR?")) { reviews = reviews.filter(r => r.id !== id); saveAndRender(); }
        }

        function populateGenreFilter() {
            const select = document.getElementById('filter-genre');
            select.innerHTML = '<option value="all">GÉNEROS</option>';
            [...new Set(reviews.flatMap(r => r.genres || []))]
                .sort()
                .forEach(g => {
                    select.innerHTML += `<option value="${g}">${g}</option>`;
                });
        }

        // ---------- INICIALIZACIÓN ----------
        // 1. Verificar sesión admin
        checkAdminSession();
        // 2. Renderizar elementos básicos
        renderGenreCloud();
        initializeSliders();
        populateGenreFilter();
        renderReviews();
        // 3. Cargar datos remotos (sobrescribe localStorage si tiene éxito)
        loadRemoteData();

        // Función exportData e importData (se mantienen igual)
        function exportData() {
            const data = {
                reviews: JSON.parse(localStorage.getItem('myReviews_manga')) || [],
                suggestions: JSON.parse(localStorage.getItem('manga_suggestions')) || [],
                customGenres: JSON.parse(localStorage.getItem('customGenres_manga')) || []
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `manga_archive_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast("ARCHIVO EXPORTADO");
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    reviews = data.reviews || [];
                    suggestions = data.suggestions || [];
                    customGenres = data.customGenres || [];
                    localStorage.setItem('myReviews_manga', JSON.stringify(reviews));
                    localStorage.setItem('manga_suggestions', JSON.stringify(suggestions));
                    localStorage.setItem('customGenres_manga', JSON.stringify(customGenres));
                    renderGenreCloud();
                    renderReviews();
                    populateGenreFilter();
                    showToast("DATOS IMPORTADOS");
                } catch(err) {
                    console.error(err);
                    alert(err.name + "\n\n" + err.message);
                    showToast("JSON INVÁLIDO");
                }
            };
            reader.readAsText(file);
        }

        // Exponer funciones globalmente para los onclick de HTML
        window.syncFromRemote = syncFromRemote;
        window.exportData = exportData;
        window.importData = importData;
        window.toggleAdminMode = toggleAdminMode;
        window.setActiveTab = setActiveTab;
        window.setFormCategory = setFormCategory;
        window.submitSuggestion = submitSuggestion;
        window.deleteSuggestion = deleteSuggestion;
        window.startEdit = startEdit;
        window.deleteReview = deleteReview;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.cancelEdit = cancelEdit;
        window.scrollToForm = scrollToForm;
        window.addCustomGenre = addCustomGenre;
        window.toggleGenre = toggleGenre;
        window.toggleVillainRating = toggleVillainRating;
        window.renderReviews = renderReviews;
        window.syncFromRemote = syncFromRemote; // para el botón
    </script>
</body>
</html>
